# Publishes to PyPI via trusted publishing:
# - tag `vX.Y.Z`              -> publish gsee
# - tag `climate-data-vX.Y.Z` -> publish gsee-climate-data

name: Release

on:
  push:
    tags:
      - "v*"
      - "climate-data-v*"

jobs:
  publish-gsee:
    if: startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check tag matches package version
        run: |
          version=$(python -c "exec(open('src/gsee/_version.py').read()); print(__version__)")
          test "v${version}" = "${{ github.ref_name }}"
      - name: Build
        run: |
          python -m pip install build
          python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-climate-data:
    if: startsWith(github.ref_name, 'climate-data-v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check tag matches package version
        run: |
          version=$(python -c "import tomllib; print(tomllib.load(open('packages/gsee-climate-data/pyproject.toml', 'rb'))['project']['version'])")
          test "climate-data-v${version}" = "${{ github.ref_name }}"
      - name: Build
        run: |
          python -m pip install build
          python -m build packages/gsee-climate-data
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/gsee-climate-data/dist
