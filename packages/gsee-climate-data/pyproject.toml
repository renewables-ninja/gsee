[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "gsee-climate-data"
version = "1.0.0"
authors = [
  { name = "Stefan Pfenninger", email = "stefan@pfenninger.org" },
]
description = "MERRA-2-derived daily irradiance PDFs for the GSEE climate data interface"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = ["numpy"]
classifiers = [
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3 :: Only",
]

[project.urls]
repository = "https://github.com/renewables-ninja/gsee"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
gsee_climate_data = ["data/*.npz"]
